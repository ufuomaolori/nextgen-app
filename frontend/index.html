<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexgen Tech Platform Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React Core Libraries via CDN for seamless single-instance orchestration -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-950 text-white font-sans min-h-screen">

    <div id="root"></div>

    <script type="text/babel">
        function App() {
            const [status, setStatus] = React.useState({ runtime: 'Loading...', database: 'Loading...' });
            const [orders, setOrders] = React.useState([]);
            const [loading, setLoading] = React.useState(false);

            // Change this to match your Coolify domain configurations dynamically
            const API_URL = window.location.origin.replace('3000', '5000') + '/api';

            React.useEffect(() => {
                fetchStatus();
                fetchOrders();
            }, []);

            const fetchStatus = () => {
                fetch(`${API_URL}/status`)
                    .then(res => res.json())
                    .then(data => setStatus(data))
                    .catch(() => setStatus({ runtime: 'Error connecting', database: 'Offline' }));
            };

            const fetchOrders = () => {
                fetch(`${API_URL}/orders`)
                    .then(res => res.json())
                    .then(data => setOrders(data))
                    .catch(() => console.error("Error fetching database records"));
            };

            const triggerMockTransaction = async () => {
                setLoading(true);
                await fetch(`${API_URL}/orders/paystack-webhook`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ product: "Premium Cluster Subscription", amount: 75000 })
                });
                setLoading(false);
                fetchOrders();
            };

            return (
                <div class="min-h-screen flex flex-col justify-between">
                    <header class="border-b border-slate-800 bg-slate-900/60 backdrop-blur px-8 py-4 flex justify-between items-center">
                        <div class="flex items-center space-x-3">
                            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center font-bold">N</div>
                            <span class="font-bold tracking-wider text-xl">NEXGEN TECH</span>
                        </div>
                        <span class="text-xs font-mono bg-slate-800 text-slate-400 px-3 py-1 rounded-md border border-slate-700">Environment: Production (PaaS)</span>
                    </header>

                    <main class="max-w-4xl mx-auto w-full px-4 py-12 flex-grow">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                            <div class="p-6 bg-slate-900 rounded-xl border border-slate-800">
                                <h3 class="text-sm font-semibold text-slate-400 mb-4 tracking-wider uppercase">Platform Infrastructure State</h3>
                                <div class="space-y-3 font-mono text-sm">
                                    <div class="flex justify-between"><span>Runtime Engine:</span> <span class="text-blue-400 font-bold">{status.runtime}</span></div>
                                    <div class="flex justify-between"><span>MongoDB Core:</span> <span class="text-emerald-400 font-bold">{status.database}</span></div>
                                </div>
                            </div>

                            <div class="p-6 bg-slate-900 rounded-xl border border-slate-800 flex flex-col justify-between">
                                <div>
                                    <h3 class="text-sm font-semibold text-slate-400 mb-2 tracking-wider uppercase">Paystack Automation Gateway</h3>
                                    <p class="text-xs text-slate-500 mb-4">Simulate a customer payment webhook transaction firing directly into your cluster backend database routing.</p>
                                </div>
                                <button onClick={triggerMockTransaction} disabled={loading} class="w-full bg-blue-600 hover:bg-blue-500 disabled:bg-slate-700 text-sm font-semibold py-2.5 rounded-lg transition shadow-lg shadow-blue-600/10">
                                    {loading ? 'Processing Transaction...' : 'Simulate Paystack Order Webhook'}
                                </button>
                            </div>
                        </div>

                        <div class="p-6 bg-slate-900 rounded-xl border border-slate-800">
                            <h3 class="text-sm font-semibold text-slate-400 mb-4 tracking-wider uppercase">Live Database Ledger Entries (MongoDB)</h3>
                            {orders.length === 0 ? (
                                <p class="text-sm text-slate-500 font-mono text-center py-6">No records found. Click the simulation button above to generate tracking logs.</p>
                            ) : (
                                <div class="space-y-2 max-h-64 overflow-y-auto pr-2">
                                    {orders.map((order, i) => (
                                        <div key={i} class="p-3 bg-slate-950 rounded border border-slate-800 flex justify-between text-xs font-mono">
                                            <div>
                                                <span class="text-blue-400 font-semibold">{order.product}</span>
                                                <span class="text-slate-600 mx-2">|</span>
                                                <span class="text-slate-400">₦{order.amount.toLocaleString()}</span>
                                            </div>
                                            <span class="text-emerald-500">{order.paymentStatus}</span>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </main>

                    <footer class="text-center py-6 text-xs text-slate-600 border-t border-slate-900 bg-slate-950/40">
                        &copy; 2026 Virtual Colocation Infrastructure Services.
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
